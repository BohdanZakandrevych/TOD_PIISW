events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      keep-alive;
  }

  upstream frontend {
    server frontend:4000;
  }

  upstream backend {
    server backend:8080;
  }

  server {
    listen 80;
    server_name api.dot.bozbase.com;

    # CORS for browser requests originating from the frontend domain.
    set $cors_origin "";
    if ($http_origin ~* '^https?://dot\.bozbase\.com$') {
      set $cors_origin $http_origin;
    }

    # Handle CORS preflight requests.
    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
      add_header 'Access-Control-Max-Age' 86400 always;
      add_header 'Vary' 'Origin' always;
      add_header 'Content-Length' 0;
      add_header 'Content-Type' 'text/plain; charset=utf-8';
      return 204;
    }

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Vary' 'Origin' always;
    }
  }

  server {
    listen 80;
    server_name dot.bozbase.com;

    # Optional convenience proxy: if the frontend calls relative URLs like /api/...,
    # this keeps everything same-origin and avoids CORS.
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
