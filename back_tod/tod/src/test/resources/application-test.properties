# Disable docker-compose for tests (if you are using it)
spring.docker.compose.skip.in-tests=true

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:tod_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Test Secret (so tests don't fail if they can't find environment variables)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration-millis=86400000